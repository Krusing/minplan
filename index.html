<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinPlan</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">

    <header id="topbar">
      <span id="logo">MinPlan</span>
      <div id="view-toggle">
        <button class="view-btn active" data-view="split">Split</button>
        <button class="view-btn" data-view="2d">2D Plan</button>
        <button class="view-btn" data-view="3d">3D Vy</button>
      </div>
      <div id="topbar-right">
        <span id="nav-hint">Scroll = zooma &nbsp;·&nbsp; Alt+dra = panorera &nbsp;·&nbsp; Högerklick = avbryt</span>
        <button class="action-btn" id="btn-center-camera">Centrera på kamera</button>
        <button class="action-btn danger" id="btn-clear">Rensa allt</button>
      </div>
    </header>

    <div id="main">

      <aside id="sidebar">
        <div class="section-label">Verktyg</div>

        <button class="tool-btn active" data-tool="wall">
          <svg class="tool-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="10" x2="17" y2="10"/>
            <circle cx="3" cy="10" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="17" cy="10" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          Rita vägg
        </button>

        <button class="tool-btn" data-tool="erase">
          <svg class="tool-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17l4-4 7-7-3-3-7 7-1 7z"/>
            <line x1="11" y1="6" x2="14" y2="9"/>
          </svg>
          Radera
        </button>

        <button class="tool-btn" data-tool="paint">
          <svg class="tool-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 16 L14 6 L16 4 L16 4 Q17.5 2.5 18 4 L16 6 L6 16 Z"/>
            <path d="M3 17 Q2 19 4 18 Q5 18 5 17 Q5 16 4 16 Q3 16 3 17Z" fill="currentColor" stroke="none"/>
          </svg>
          Färga vägg
        </button>

        <div id="paint-settings" class="settings-panel hidden">
          <div class="setting-row">
            <span class="setting-label">Färg</span>
            <input type="color" id="wall-color" value="#f5f0e8">
          </div>
        </div>

        <div class="sidebar-sep"></div>
        <div class="section-label">Öppningar</div>

        <button class="tool-btn" data-tool="door">
          <svg class="tool-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="3" width="10" height="14" rx="1"/>
            <path d="M5 3 A10 10 0 0 1 15 13" stroke-dasharray="2 1.5"/>
            <circle cx="13.5" cy="10" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
          Dörr
        </button>

        <button class="tool-btn" data-tool="window">
          <svg class="tool-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="14" height="8" rx="1"/>
            <line x1="10" y1="6" x2="10" y2="14"/>
            <line x1="3" y1="10" x2="17" y2="10"/>
          </svg>
          Fönster
        </button>

        <div id="opening-settings" class="hidden">
          <div id="door-settings" class="settings-panel">
            <div class="setting-row">
              <span class="setting-label">Bredd</span>
              <input type="number" id="door-width" value="1.0" min="0.5" max="4.0" step="0.5">
              <span class="setting-unit">m</span>
            </div>
            <div class="setting-row">
              <span class="setting-label">Höjd</span>
              <input type="number" id="door-height" value="2.0" min="1.0" max="2.5" step="0.5">
              <span class="setting-unit">m</span>
            </div>
          </div>
          <div id="window-settings" class="settings-panel hidden">
            <div class="setting-row">
              <span class="setting-label">Bredd</span>
              <input type="number" id="win-width" value="1.0" min="0.5" max="4.0" step="0.5">
              <span class="setting-unit">m</span>
            </div>
            <div class="setting-row">
              <span class="setting-label">Höjd</span>
              <input type="number" id="win-height" value="1.0" min="0.5" max="2.0" step="0.5">
              <span class="setting-unit">m</span>
            </div>
            <div class="setting-row">
              <span class="setting-label">Från golv</span>
              <input type="number" id="win-floor" value="1.0" min="0.5" max="2.0" step="0.5">
              <span class="setting-unit">m</span>
            </div>
          </div>
        </div>

      </aside>

      <div id="canvas-wrap">
        <canvas id="floor-plan"></canvas>
        <div id="scale-info">1 ruta = 50 cm</div>
        <div id="status">Klicka för att börja rita en vägg</div>
      </div>

      <div id="view-3d">
        <div id="view-3d-label">3D-vy &nbsp;·&nbsp; dra för att rotera &nbsp;·&nbsp; scroll för att zooma</div>
      </div>

    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
